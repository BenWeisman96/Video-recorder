<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Zoom Share</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Record + Share</h1>
    <input id="title" placeholder="Recording title" />
    <label><input type="checkbox" id="screen" checked /> Share screen</label>
    <label><input type="checkbox" id="camera" checked /> Include camera</label>
    <label><input type="checkbox" id="noExpiry" /> Never expire link</label>
    <div class="controls">
      <button id="start">Start</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <video id="preview" autoplay muted playsinline></video>
    <p id="status"></p>
    <pre id="result"></pre>
  </main>

  <div id="permissionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="permissionTitle">
    <div class="modal-card">
      <h2 id="permissionTitle">Allow camera / mic / screen</h2>
      <p>Next, your browser will show permission prompts. Click <strong>Allow</strong> so recording can start.</p>
      <div class="modal-actions">
        <button id="modalCancel">Cancel</button>
        <button id="modalContinue">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
