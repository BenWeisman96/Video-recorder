<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Zoom Share</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Record + Share</h1>
    <input id="title" placeholder="Recording title" />
    <label><input type="checkbox" id="screen" checked /> Share screen</label>
    <label><input type="checkbox" id="camera" checked /> Include camera</label>
    <label><input type="checkbox" id="noExpiry" /> Never expire link</label>
    <div class="controls">
      <button id="start">Start</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <video id="preview" autoplay muted playsinline></video>
    <p id="status"></p>
    <pre id="result"></pre>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
