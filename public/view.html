<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Recording</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1 id="title">Loading…</h1>
    <video id="player" controls playsinline></video>
    <p id="meta"></p>
  </main>
  <script type="module">
    const token = location.pathname.split('/').pop();
    const res = await fetch(`/api/share/${token}`);
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('title').textContent = data.error || 'Unavailable';
    } else {
      document.getElementById('title').textContent = data.title || 'Recording';
      document.getElementById('meta').textContent = data.expiresAt ? `Expires: ${new Date(data.expiresAt).toLocaleString()}` : 'No expiration';
      const p = document.getElementById('player');
      p.src = data.videoUrl;
    }
  </script>
</body>
</html>
